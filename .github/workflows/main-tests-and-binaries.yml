name: Main Tests and Binaries

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: cd ui && npm ci && npm run build

      - name: Run tests
        run: |
          make vet
          make test
          make test-blackbox

      - name: Build binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o dist/trader-linux-amd64 ./cmd/main.go
          GOOS=linux GOARCH=arm64 go build -o dist/trader-linux-arm64 ./cmd/main.go

      - name: Upload amd64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: trader-linux-amd64
          path: dist/trader-linux-amd64
          if-no-files-found: error

      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: trader-linux-arm64
          path: dist/trader-linux-arm64
          if-no-files-found: error
