name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write   # required to push to ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: cd ui && npm ci && npm run build

      - name: Run tests
        run: |
          make vet
          make test
          make test-blackbox

      - name: Build binaries
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X github.com/rustyeddy/trader.Version=${{ github.ref_name }}"
          GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/trader-linux-amd64 ./cmd/main.go
          GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/trader-linux-arm64 ./cmd/main.go
          cd dist && sha256sum trader-linux-* > checksums.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Trader ${{ github.ref_name }}" \
            --generate-notes \
            dist/trader-linux-amd64 \
            dist/trader-linux-arm64 \
            dist/checksums.txt

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/rustyeddy/trader:latest
            ghcr.io/rustyeddy/trader:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
