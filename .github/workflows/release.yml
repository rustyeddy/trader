name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Build UI
        run: cd ui && npm ci && npm run build

      - name: Run tests
        run: |
          make vet
          make test
          make test-blackbox

      - name: Build binaries
        run: |
          mkdir -p dist
          LDFLAGS="-s -w -X github.com/rustyeddy/trader.Version=${{ github.ref_name }}"
          GOOS=linux GOARCH=amd64 go build -ldflags="$LDFLAGS" -o dist/trader-linux-amd64 ./cmd/main.go
          GOOS=linux GOARCH=arm64 go build -ldflags="$LDFLAGS" -o dist/trader-linux-arm64 ./cmd/main.go
          cd dist && sha256sum trader-linux-* > checksums.txt

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "Trader ${{ github.ref_name }}" \
            --generate-notes \
            dist/trader-linux-amd64 \
            dist/trader-linux-arm64 \
            dist/checksums.txt
