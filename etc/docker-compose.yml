# Trader — three-role compose stack
#
# Roles:
#   data      — Dukascopy candle sync; run on demand or via cron
#   backtest  — on-demand backtests (profile: backtest; exits when done)
#   live      — 24/5 live strategy, always restarted
#   postgres  — database for future use (not currently used by trader)
#
# Journal backends:
#   csv       — flat files on the candle NFS volume; works everywhere including Pi
#   json      — JSONL files on the candle NFS volume
#   sqlite    — local dev only; requires image built with --build-arg SQLITE=1
#
# Quick start:
#   cp deploy/env.example .env
#   docker compose up -d live
#   docker compose run --rm backtest
#   docker compose run --rm data

services:

  # ── postgres ───────────────────────────────────────────────────────────────
  # Database service for future use. Not currently used by trader.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: trader
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [postgres]

  # ── data ──────────────────────────────────────────────────────────────────
  # Downloads Dukascopy candles into the shared candle volume.
  # Intended for one-shot / cron use; not a long-running daemon.
  data:
    image: ${TRADER_IMAGE:-ghcr.io/rustyeddy/trader:latest}
    build:
      context: .
      args:
        VERSION: ${TRADER_VERSION:-dev}
    command: >
      data dukas
      --instrument ${INSTRUMENT:-EUR_USD}
      --data-dir /data/candles
    volumes:
      - candles:/data/candles
    environment:
      TZ: UTC
    restart: "no"

  # ── backtest ───────────────────────────────────────────────────────────────
  # Runs a config-driven backtest and exits.
  #   docker compose run --rm backtest
  #   docker compose run --rm -v ./my.yml:/config/backtest.yml backtest
  backtest:
    image: ${TRADER_IMAGE:-ghcr.io/rustyeddy/trader:latest}
    build:
      context: .
      args:
        VERSION: ${TRADER_VERSION:-dev}
    command: >
      backtest regress
      --config /config/backtest.yml
      --data-dir /data/candles
    volumes:
      - candles:/data/candles
      - ${BACKTEST_CONFIG_DIR:-./testdata/configs}:/config:ro
      - backtest-reports:/var/lib/trader/reports
    environment:
      TZ: UTC
    profiles: [backtest]
    restart: "no"

  # ── live ──────────────────────────────────────────────────────────────────
  # Live trading strategy. Restarts automatically on crash or reboot.
  # Journal defaults to csv (NFS-friendly); set JOURNAL=json to use JSONL format.
  live:
    image: ${TRADER_IMAGE:-ghcr.io/rustyeddy/trader:latest}
    build:
      context: .
      args:
        VERSION: ${TRADER_VERSION:-dev}
    command: >
      live run
      --instrument ${INSTRUMENT:-EUR_USD}
      --strategy ${STRATEGY:-pulse}
      --data-dir /data/candles
      --journal ${JOURNAL:-csv}
      --log-level info
    volumes:
      - candles:/data/candles
      - trader-csv:/var/lib/trader/csv
    environment:
      OANDA_TOKEN: ${OANDA_TOKEN:?OANDA_TOKEN is required}
      OANDA_ACCOUNT_ID: ${OANDA_ACCOUNT_ID:?OANDA_ACCOUNT_ID is required}
      OANDA_ENV: ${OANDA_ENV:-practice}
      DATABASE_URL: ${DATABASE_URL:-}
      TZ: UTC
    restart: unless-stopped
    stop_grace_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  candles:
    # On a Pi cluster sharing NFS, replace with driver: local + driver_opts.
    # See deploy/docker-compose.pi.yml for the NFS overlay.
  postgres-data:
  trader-csv:
  backtest-reports:
