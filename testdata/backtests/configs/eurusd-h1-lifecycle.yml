version: 1

# Minimal infrastructure smoke-test: opens long on bar 1, closes on bar 3.
# Always produces exactly 1 trade. Use this to catch regressions in the
# configâ†’candlesâ†’strategyâ†’Traderâ†’Brokerâ†’Accountâ†’Result pipeline without
# any strategy-specific logic getting in the way.

defaults:
  starting-balance: 10000
  account-ccy: USD
  risk-pct: 1.0
  source: oanda

runs:
  - name: eurusd-h1-lifecycle
    data:
      instrument: EURUSD
      timeframe: H1
      from: 2024-01-01
      to: 2024-03-31
    strategy:
      kind: lifecycle-test
      params:
        units: 1000
        stop_pips: 20
