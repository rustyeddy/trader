# pulse-demo.yml — demo account live trading bot
#
# Runs the "pulse" mechanical strategy against a practice OANDA account.
# Designed to validate the full strategy → runner → broker pipeline
# with minimal financial risk (0.1% NAV per trade).
#
# Usage:
#   trader live run --config testdata/configs/pulse-demo.yml
#   trader live run --config testdata/configs/pulse-demo.yml --dry-run

instrument: EUR_USD
env: practice
tick_interval: 60s      # poll prices every 60 seconds (1 candle-bar at M1)
max_positions: 2        # never hold more than 2 open positions at once
risk_pct: 0.1           # risk 0.1% of account NAV per trade

strategy:
  kind: pulse
  params:
    trade_every: 5       # open a new position every 5 ticks (~5 minutes)
    hold_bars: 15        # close each position after 15 ticks (~15 minutes)
    max_positions: 2     # must match top-level max_positions
    side: alternate      # alternate long / short
    stop_pips: 20        # 20-pip stop loss (≈$20 on a 10k-unit position)
    take_pips: 0         # no take-profit; rely on stop + hold_bars close
    risk_pct: 0.1        # % of account NAV risked per trade
