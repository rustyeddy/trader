version: 1

# majors-review-sweep.yml — example review-sweep config: replays watchlist
# classification (Watch/Hot/Tradeable) daily over a date range for the
# major pairs.
#
# Usage:
#   curl -X POST localhost:9999/api/v1/review-sweeps/run \
#     -d '{"config_paths": ["testdata/configs/majors-review-sweep.yml"]}'

runs:
  - name: majors-daily-2026-q2
    instruments: [EURUSD, GBPUSD, USDJPY]
    from: 2026-04-01
    to: 2026-06-30
    interval: 24h
