version: 1

# scalper-backtest.yml — incremental development config for the scalper strategy.
#
# Intentionally short date range (1 month) so each iteration runs in seconds.
# Widen `from`/`to` once signal logic is producing sensible results.
#
# Usage:
#   make backtest-scalper
#   trader backtest run testdata/configs/scalper-backtest.yml

defaults:
  starting-balance: 2000
  account-ccy: USD
  scale: 100000
  risk-pct: 0.1
  source: oanda

runs:
  - name: scalper-usdjpy-m1-jan2024
    data:
      instrument: USDJPY
      timeframe: M1
      from: 2024-02-01
      to: 2024-02-29
    strategy:
      kind: scalper
      params:
        fast_period: 3
        slow_period: 8
        atr_period: 14
        stop_multiplier: 1.0
        warmup_bars: 20

    exit:
      kind: chandelier
      params:
        atr_period: 14
        multiplier: 2.0
