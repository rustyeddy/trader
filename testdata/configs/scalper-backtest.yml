version: 1

# scalper-backtest.yml — incremental development config for the scalper strategy.
#
# Intentionally short date range (1 month) so each iteration runs in seconds.
# Widen `from`/`to` once signal logic is producing sensible results.
#
# Usage:
#   make backtest-scalper
#   trader backtest run testdata/configs/scalper-backtest.yml

defaults:
  starting-balance: 2000
  account-ccy: USD
  scale: 100000
  risk-pct: 0.1
  source: oanda

runs:
  - name: scalper-eurusd-m1-jan2024
    data:
      instrument: EURUSD
      timeframe: M1
      from: 2024-01-01
      to: 2024-01-31
    strategy:
      kind: scalper
      params:
        fast_period: 3
        slow_period: 8
        warmup_bars: 20
