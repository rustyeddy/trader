version: 1

defaults:
  starting-balance: 10000
  account-ccy: USD
  scale: 100000
  strict: true
  risk-pct: 0.5
  stop-pips: 20
  take-pips: 40
  source: candles

runs:
  - name: eurusd-h1-2024-template
    data:
      instrument: EURUSD
      timeframe: H1
      from: 2024-01-01
      to: 2024-12-31
    strategy:
      kind: template
      params:
        lookback: 5
        threshold: 0.0015
