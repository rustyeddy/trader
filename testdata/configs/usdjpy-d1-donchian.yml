version: 1

defaults:
  starting-balance: 10000
  account-ccy: USD
  scale: 100000
  risk-pct: 1.0
  source: oanda
  max-spread-pips: 5.0

runs:
  - name: usdjpy-d1-donchian20-chandelier3
    data:
      instrument: USDJPY
      timeframe: D1
      from: 2019-01-01
      to: 2024-12-31
    strategy:
      kind: donchian-breakout
      params:
        period: 20
        close_strength: 0.6
    exit:
      kind: chandelier
      params:
        atr_period: 14
        multiplier: 3.0

  - name: eurusd-d1-donchian20-chandelier3
    data:
      instrument: EURUSD
      timeframe: D1
      from: 2019-01-01
      to: 2024-12-31
    strategy:
      kind: donchian-breakout
      params:
        period: 20
        close_strength: 0.6
    exit:
      kind: chandelier
      params:
        atr_period: 14
        multiplier: 3.0
