# Tournament account: USDJPY D1 Donchian-v2 ATR×6
#
# Backtest result (IS 2005-2025): +14.4%, OOS (2020-2025): +6.0%
# 1% risk per trade, $2,000 practice account
#
# JPY carry note: USDJPY, AUDJPY, EURJPY are correlated — run them on
# separate accounts but size each as 1/3 of a combined JPY risk unit.
#
# Usage:
#   trader serve --account-id <usdjpy-account-id>
#   trader bot start --config testdata/configs/tournament-usdjpy.yml

env: practice
risk_pct: 1.0
drawdown_circuit_pct: 20.0
local_warmup_bars: 500

instruments:

  - instrument: USD_JPY
    timeframe: D1
    tick_interval: 15m       # D1 bar closes at 22:00 UTC — poll every 15min is sufficient
    risk_pct: 1.0
    max_units: 0             # uncapped; sized by risk_pct alone

    strategy:
      kind: donchian-breakout-v2
      params:
        period: 55
        close_strength: 0.6
        confirm_bars: 1

    exit:
      kind: chandelier
      params:
        atr_period: 14
        multiplier: 6.0
