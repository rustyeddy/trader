# Tournament account: EURJPY D1 Donchian-v2 ATR×6
#
# Backtest result (IS 2005-2019): +4.4%, OOS (2020-2025): +1.2%
# 1% risk per trade, $2,000 practice account
#
# JPY carry note: treat EURJPY as 1/3 of the combined JPY risk unit
# alongside USDJPY and AUDJPY.
#
# Usage:
#   trader serve --account-id <eurjpy-account-id>
#   trader bot start --config testdata/configs/tournament-eurjpy.yml

env: practice
risk_pct: 1.0
drawdown_circuit_pct: 20.0
local_warmup_bars: 500

instruments:

  - instrument: EUR_JPY
    timeframe: D1
    tick_interval: 15m
    risk_pct: 1.0
    max_units: 0

    strategy:
      kind: donchian-breakout-v2
      params:
        period: 55
        close_strength: 0.6
        confirm_bars: 1

    exit:
      kind: chandelier
      params:
        atr_period: 14
        multiplier: 6.0
