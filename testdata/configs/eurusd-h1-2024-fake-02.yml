---
version: 1

defaults:
  starting_balance: 2000
  account_ccy: USD
  scale: 100000
  strict: true
  risk_pct: 0.5
  source: candles

runs:
  - name: eurusd-h1-2024-fake-02
    data:
      instrument: EURUSD
      timeframe: H1
      from: 2024-01-01
      to: 2024-12-31
    strategy:
      kind: fake-02
      params:
        wait_bars: 8
        hold_bars: 6
        stop_pips: 20
        units: 1000
        risk_pct: 0.5
