version: 1

defaults:
  starting_balance: 10000
  account_ccy: USD
  scale: 100000
  strict: true
  risk_pct: 0.5
  units: 1000
  source: candles

runs:
  - name: eurusd-h1-2024-template
    data:
      instrument: EURUSD
      timeframe: H1
      from: 2024-01-01
      to: 2024-12-31
    strategy:
      kind: fake
      params:
        lookback: 5
        threshold: 0.0015
