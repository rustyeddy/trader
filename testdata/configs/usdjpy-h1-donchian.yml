version: 1

defaults:
  starting-balance: 10000
  account-ccy: USD
  scale: 100000
  risk-pct: 1.0
  source: dukas
  max-spread-pips: 1.5

runs:
  - name: usdjpy-h1-donchian20-chandelier3
    data:
      instrument: USDJPY
      timeframe: H1
      from: 2019-01-01
      to: 2024-12-31
    strategy:
      kind: donchian-breakout
      params:
        period: 20
        close_strength: 0.6
    exit:
      kind: chandelier
      params:
        atr_period: 14
        multiplier: 3.0
    regime:
      kind: choppiness
      params:
        period: 14
        threshold: 61.8

  - name: eurusd-h1-donchian20-chandelier3
    data:
      instrument: EURUSD
      timeframe: H1
      from: 2019-01-01
      to: 2024-12-31
    strategy:
      kind: donchian-breakout
      params:
        period: 20
        close_strength: 0.6
    exit:
      kind: chandelier
      params:
        atr_period: 14
        multiplier: 3.0
    regime:
      kind: choppiness
      params:
        period: 14
        threshold: 61.8
