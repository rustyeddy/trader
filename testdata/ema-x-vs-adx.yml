runs:
  - name: eurusd_h1_ema_cross
    data:
      instrument: EURUSD
      timeframe: H1
      from: 2024-01-01
      to: 2024-06-30
    strategy:
      kind: ema-cross
      params:
        fast: 12
        slow: 26
        stop_pips: 20
        take_pips: 40
        risk_pct: 0.5

  - name: eurusd_h1_ema_cross_adx
    data:
      instrument: EURUSD
      timeframe: H1
      from: 2024-01-01
      to: 2024-06-30
    strategy:
      kind: ema-cross-adx
      params:
        fast: 12
        slow: 26
        adx_period: 14
        adx_threshold: 20
        require_di: true
        require_adx_ready: true
        stop_pips: 20
        take_pips: 40
        risk_pct: 0.5
